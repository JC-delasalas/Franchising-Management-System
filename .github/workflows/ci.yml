name: CI

on:
  push:
    branches: [main, "rebuild/**"]
  pull_request:
    branches: [main, "rebuild/**"]

# Cancel in-progress runs when a new commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt-in early to Node 24 for GitHub Actions internals. Node 20 is being
# removed from runners on Sep 16, 2026; this opts us in ahead of the default
# flip on Jun 2, 2026. Doesn't affect our app's Node version (set below).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Build
        # Build needs at least placeholder Supabase env vars so middleware
        # can compile (cf. lib/supabase/middleware.ts). Real values come
        # from Vercel project env.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
        run: npm run build
