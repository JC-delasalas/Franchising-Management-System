<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for the new logo -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C92A2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9999;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkRedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C92A2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D1D1D;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Left Building (Dark Red) -->
  <g id="left-building">
    <!-- Left building back face -->
    <polygon points="80,180 80,380 140,420 140,220" fill="url(#darkRedGradient)" />
    <!-- Left building front face -->
    <polygon points="140,220 140,420 200,380 200,180" fill="url(#redGradient)" />
    <!-- Left building side face -->
    <polygon points="80,180 140,220 200,180 140,140" fill="#FF9999" />

    <!-- Windows on left building -->
    <rect x="95" y="240" width="20" height="20" fill="white" />
    <rect x="125" y="240" width="20" height="20" fill="white" />
    <rect x="95" y="280" width="20" height="20" fill="white" />
    <rect x="125" y="280" width="20" height="20" fill="white" />
  </g>

  <!-- Center Building (Light Pink/Red) -->
  <g id="center-building">
    <!-- Center building back face -->
    <polygon points="200,100 200,380 280,420 280,140" fill="url(#pinkGradient)" />
    <!-- Center building front face -->
    <polygon points="280,140 280,420 360,380 360,100" fill="url(#redGradient)" />
    <!-- Center building side face -->
    <polygon points="200,100 280,140 360,100 280,60" fill="#FFB3B3" />

    <!-- Windows on center building -->
    <rect x="220" y="160" width="20" height="20" fill="white" />
    <rect x="250" y="160" width="20" height="20" fill="white" />
    <rect x="220" y="200" width="20" height="20" fill="white" />
    <rect x="250" y="200" width="20" height="20" fill="white" />

    <!-- Door on center building -->
    <rect x="230" y="320" width="30" height="50" fill="#C92A2A" />
  </g>

  <!-- Right Building (Dark Red) -->
  <g id="right-building">
    <!-- Right building back face -->
    <polygon points="360,180 360,380 420,420 420,220" fill="url(#darkRedGradient)" />
    <!-- Right building front face -->
    <polygon points="420,220 420,420 480,380 480,180" fill="url(#redGradient)" />
    <!-- Right building side face -->
    <polygon points="360,180 420,220 480,180 420,140" fill="#FF9999" />

    <!-- Windows on right building -->
    <rect x="375" y="240" width="20" height="20" fill="white" />
    <rect x="405" y="240" width="20" height="20" fill="white" />
    <rect x="375" y="280" width="20" height="20" fill="white" />
    <rect x="405" y="280" width="20" height="20" fill="white" />
  </g>

  <!-- Connecting bridges/ribbons -->
  <g id="connectors" fill="white" opacity="0.95">
    <!-- Left connector -->
    <path d="M 200 280 Q 240 300 280 280 L 280 320 Q 240 340 200 320 Z" fill="white" />
    <!-- Right connector -->
    <path d="M 280 280 Q 320 300 360 280 L 360 320 Q 320 340 280 320 Z" fill="white" />
  </g>
</svg>
